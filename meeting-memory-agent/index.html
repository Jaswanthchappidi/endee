<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Memory — Premium AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #c8a96e;
            --primary-dark: #8b6f47;
            --primary-light: #d4b87a;
            --bg-body: #0c0c0e;
            --bg-card: rgba(19, 19, 22, 0.7);
            --bg-sidebar: rgba(12, 12, 14, 0.8);
            --text-main: #f8fafc;
            --text-dim: #9b9892;
            --border: rgba(255, 255, 255, 0.08);
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --success: #4caf82;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0c0c0e;
            background-image: radial-gradient(circle at 20% 20%, #1a1a24 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, #16161d 0%, transparent 50%);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Bg Glows */
        .bg-glow {
            position: fixed;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(200, 169, 110, 0.05) 0%, transparent 70%);
            top: -300px;
            right: -300px;
            z-index: -1;
            pointer-events: none;
        }

        /* Nav */
        nav {
            height: 64px;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(12, 12, 14, 0.8);
            backdrop-filter: blur(20px);
            z-index: 100;
            flex-shrink: 0;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .logo span {
            color: var(--primary);
        }

        .status-pill {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            transition: var(--transition);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #475569;
        }

        .status-dot.active {
            background: var(--success);
            box-shadow: 0 0 12px var(--success);
        }

        /* App Container */
        .app-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            flex: 1;
            min-height: 0;
            /* Important for flex child scrolling */
        }

        /* Sidebar */
        .sidebar {
            background: rgba(12, 12, 14, 0.4);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            overflow-y: auto;
        }

        .sidebar-section {
            margin-bottom: 2rem;
        }

        .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-dim);
            margin-bottom: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Input Styles */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input[type="text"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.8rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            transition: var(--transition);
        }

        select option {
            background: #1a1a24;
            color: white;
            padding: 10px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(200, 169, 110, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 0.8rem;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(200, 169, 110, 0.2);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Meeting List */
        .meeting-item {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .meeting-item:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.04);
        }

        .meeting-item h4 {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .meeting-item .meta {
            font-size: 0.7rem;
            color: var(--text-dim);
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .meeting-item {
            position: relative;
        }

        .delete-btn {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            opacity: 0;
            transition: var(--transition);
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        .meeting-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        /* Main Chat */
        .main-chat {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100%;
            background: rgba(255, 255, 255, 0.01);
            overflow: hidden;
            min-height: 0;
        }

        .chat-header {
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border);
            background: rgba(12, 12, 14, 0.4);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .chat-messages {
            padding: 2.5rem 4rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            scroll-behavior: smooth;
            background: transparent;
        }

        /* Message Bubbles */
        .message {
            display: flex;
            gap: 1.25rem;
            max-width: 80%;
            animation: slideUp 0.3s ease-out;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.1rem;
        }

        .message.user .avatar {
            background: var(--primary);
            color: #000;
            border-color: var(--primary-light);
        }

        .msg-bubble {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 1.25rem 1.5rem;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.6;
            backdrop-filter: blur(10px);
            color: #e2e8f0;
        }

        .message.user .msg-bubble {
            background: var(--primary);
            color: #000;
            border: none;
            font-weight: 500;
            border-top-right-radius: 4px;
        }

        .message.assistant .msg-bubble {
            border-top-left-radius: 4px;
        }

        /* Sources */
        .msg-sources {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 1rem;
        }

        .source-tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            color: var(--primary-light);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            position: relative;
        }

        .source-tag:hover {
            background: rgba(200, 169, 110, 0.15);
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        /* Input Bar */
        .input-bar {
            padding: 1.5rem 4rem 2rem;
            background: rgba(12, 12, 14, 0.6);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            z-index: 20;
        }

        .input-box {
            background: rgba(25, 25, 30, 0.8);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            align-items: flex-end;
            padding: 0.8rem 1.25rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            transition: border-color 0.3s;
        }

        .input-box:focus-within {
            border-color: var(--primary);
        }

        textarea {
            flex: 1;
            background: transparent !important;
            border: none !important;
            padding: 0.6rem !important;
            color: var(--text-main) !important;
            font-size: 1rem !important;
            max-height: 200px;
            resize: none !important;
            box-shadow: none !important;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--primary);
            color: #000;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.2rem;
            margin-left: 0.5rem;
        }

        .send-btn:hover {
            transform: scale(1.08);
            background: var(--primary-light);
            box-shadow: 0 0 15px rgba(200, 169, 110, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        /* Tooltip */
        .source-tooltip {
            position: absolute;
            bottom: calc(100% + 12px);
            left: 0;
            width: 350px;
            background: #1e1e26;
            color: #e2e8f0;
            padding: 1.25rem;
            border-radius: 14px;
            font-size: 0.85rem;
            border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            z-index: 1000;
            display: none;
            line-height: 1.6;
            max-height: 250px;
            overflow-y: auto;
        }

        .source-tooltip.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>

    <nav>
        <div class="logo"><i class="fas fa-history"></i> meeting<span>Memory</span></div>
        <div class="status-pill">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Disconnected</span>
            <button class="btn-ghost" onclick="openSettings()"
                style="background:transparent; border:none; color:var(--text-dim); cursor:pointer; margin-left:10px;"><i
                    class="fas fa-cog"></i></button>
        </div>
    </nav>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="section-label">Index New Meeting</div>
                <div class="form-group">
                    <label>Meeting Title</label>
                    <input type="text" id="meetTitle" placeholder="Project Sync...">
                </div>
                <div class="form-group" style="display:grid; grid-template-columns: 1fr 1fr; gap:0.5rem;">
                    <div>
                        <label>Date</label>
                        <input type="date" id="meetDate">
                    </div>
                    <div>
                        <label>Project</label>
                        <input type="text" id="meetProject" placeholder="Tag">
                    </div>
                </div>
                <div class="form-group">
                    <label>Meeting Notes / Transcript</label>
                    <textarea id="meetContent" placeholder="Paste transcript here..."></textarea>
                </div>
                <button class="btn-primary" id="indexBtn" onclick="addMeeting()">Index Meeting</button>
            </div>

            <div class="sidebar-section">
                <div class="section-label" style="display:flex; justify-content:space-between;">
                    <span>Meeting Library</span>
                    <span id="meetCount">0</span>
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <div style="position:relative;">
                        <i class="fas fa-search"
                            style="position:absolute; left:0.8rem; top:50%; transform:translateY(-50%); font-size:0.75rem; color:var(--text-dim);"></i>
                        <input type="text" id="libSearch" placeholder="Filter meetings..." oninput="renderMeetings()"
                            style="padding-left:2.2rem; background:rgba(255,255,255,0.02); height: 36px; font-size:0.75rem;">
                    </div>
                </div>
                <div id="meetingList" style="flex: 1; overflow-y: auto; padding-right: 0.5rem;">
                    <!-- Meetings injected here -->
                </div>
            </div>
        </aside>

        <main class="main-chat">
            <div class="chat-header" style="display:flex; justify-content:space-between; align-items:center;">
                <div
                    style="font-size:0.7rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--text-dim); font-weight:700;">
                    Meeting Analysis</div>
                <div style="display:flex; align-items:center; gap:0.75rem;">
                    <i class="fas fa-filter" style="font-size:0.7rem; color:var(--text-dim);"></i>
                    <select id="projectFilter"
                        style="width:auto; padding:0.25rem 0.5rem; font-size:0.75rem; border-radius:6px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); outline:none; cursor:pointer;">
                        <option value="">All Projects</option>
                    </select>
                </div>
            </div>

            <div class="chat-messages" id="messages">
                <div style="text-align:center; padding-top:4rem; color:var(--text-dim);">
                    <i class="fas fa-sparkles" style="font-size:2rem; margin-bottom:1rem; opacity:0.5;"></i>
                    <h3>Welcome to Meeting Memory</h3>
                    <p style="font-size:0.85rem; max-width:400px; margin: 0.5rem auto;">
                        Ask questions across all your meetings. I'll search for context and provide cited answers.
                    </p>
                </div>
            </div>

            <div class="input-bar">
                <div class="input-box">
                    <textarea id="questionInput"
                        placeholder="Ask about decisions, owners, or action items..."></textarea>
                    <button class="send-btn" id="sendBtn" onclick="askQuestion()">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
                <div
                    style="font-size:0.65rem; color:var(--text-dim); margin-top:0.5rem; display:flex; justify-content:space-between;">
                    <span>Shift+Enter for new line · Enter to send</span>
                    <span id="chunkInfo"></span>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals & Toasts -->
    <div id="settingsModal"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(4px);">
        <div
            style="background:var(--bg-card); border:1px solid var(--border); padding:2rem; border-radius:16px; width:400px; border:1px solid var(--border);">
            <h3 style="margin-bottom:1.5rem;">Configuration</h3>
            <div class="form-group">
                <label>Endee Proxy URL</label>
                <input type="text" id="cfgEndee" placeholder="http://localhost:3001/endee">
            </div>
            <div class="form-group">
                <label>Index Name</label>
                <input type="text" id="cfgIndex" placeholder="meetings">
            </div>
            <div style="display:flex; justify-content:flex-end; gap:0.5rem; margin-top:1.5rem;">
                <button class="btn-ghost" onclick="closeSettings()"
                    style="background:transparent; border:1px solid var(--border); padding:0.5rem 1rem; border-radius:8px; color:var(--text-main);">Cancel</button>
                <button class="btn-primary" style="width:auto; padding:0.5rem 1.5rem;"
                    onclick="saveSettings()">Connect</button>
            </div>
        </div>
    </div>

    <div id="toastWrap"
        style="position:fixed; bottom:2rem; right:2rem; z-index:300; display:flex; flex-direction:column; gap:0.5rem;">
    </div>

    <div id="progressBar"
        style="position:fixed; top:64px; left:0; height:2px; background:var(--primary); width:0%; transition:width 0.3s; z-index:101;">
    </div>

    <script>
        // ═══════════════════════════════════════════
        //  CONFIG & STATE
        // ═══════════════════════════════════════════
        let CFG = {
            apiKey: localStorage.getItem('mm_api_key') || ''
        };

        let meetings = [];
        let totalChunks = 0;

        document.addEventListener('DOMContentLoaded', () => {
            const dateInput = document.getElementById('meetDate');
            if (dateInput) dateInput.value = new Date().toISOString().split('T')[0];
            fetchMeetings();
            
            const qi = document.getElementById('questionInput');
            if (qi) {
                qi.addEventListener('input', () => {
                    qi.style.height = 'auto';
                    qi.style.height = Math.min(qi.scrollHeight, 120) + 'px';
                });

                qi.addEventListener('keydown', e => {
                    if (e.key === 'Enter' && !e.shiftKey) { 
                        e.preventDefault(); 
                        askQuestion(); 
                    }
                });
            }

        });

        // ═══════════════════════════════════════════
        //  BACKEND API
        // ═══════════════════════════════════════════
        async function fetchMeetings() {
            try {
                const res = await fetch('/api/meetings');
                const data = await res.json();
                if (data.success) {
                    meetings = data.meetings;
                    totalChunks = data.totalChunks;
                    renderMeetings();
                    updateChunkInfo();
                    updateStatus();
                }
            } catch (e) { toast('Backend connection failed', 'error'); }
        }

        async function addMeeting() {
            const title = document.getElementById('meetTitle').value.trim();
            const date = document.getElementById('meetDate').value;
            const project = document.getElementById('meetProject').value.trim();
            const content = document.getElementById('meetContent').value.trim();

            if (!title || !content) { toast('Title and notes are required', 'error'); return; }

            const btn = document.getElementById('indexBtn');
            btn.disabled = true;
            btn.textContent = 'Indexing...';
            setProgress(30);

            try {
                const res = await fetch('/api/index', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, date, project, content })
                });
                const data = await res.json();

                if (data.success) {
                    toast(`Indexed ${data.chunksIndex} chunks`, 'success');
                    setProgress(100);
                    fetchMeetings();

                    document.getElementById('meetTitle').value = '';
                    document.getElementById('meetContent').value = '';
                    document.getElementById('meetProject').value = '';
                }
            } catch (e) { toast('Error indexing meeting', 'error'); }
            finally {
                btn.disabled = false;
                btn.textContent = 'Index Meeting';
                setTimeout(() => setProgress(0), 1000);
            }
        }

        async function deleteMeeting(title, event) {
            if (event) event.stopPropagation();
            if (!confirm(`Are you sure you want to delete "${title}"?`)) return;

            try {
                const res = await fetch(`/api/meetings/${encodeURIComponent(title)}`, {
                    method: 'DELETE'
                });
                const data = await res.json();
                if (data.success) {
                    toast('Meeting deleted', 'success');
                    fetchMeetings();
                }
            } catch (e) { toast('Error deleting meeting', 'error'); }
        }

        async function askQuestion() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            if (!question) return;

            if (meetings.length === 0) { toast('Add some meetings first!', 'error'); return; }

            hideWelcome();
            addUserMsg(question);
            input.value = '';
            input.style.height = 'auto';

            const thinkEl = addThinking();
            document.getElementById('sendBtn').disabled = true;
            setProgress(40);

            try {
                const res = await fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: question,
                        project: document.getElementById('projectFilter').value
                    })
                });
                const data = await res.json();

                removeThinking(thinkEl);
                addAssistantMsg(data.answer, data.sources || []);
                setProgress(100);
            } catch (e) {
                removeThinking(thinkEl);
                addAssistantMsg(`System Error: ${e.message}`, []);
            } finally {
                document.getElementById('sendBtn').disabled = false;
                setTimeout(() => setProgress(0), 1000);
            }
        }

        // ═══════════════════════════════════════════
        //  SETTINGS
        // ═══════════════════════════════════════════
        function openSettings() {
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function closeSettings() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        function saveSettings() {
            closeSettings();
            toast('Settings saved', 'success');
        }

        function updateStatus() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            // Backend-managed, always show connected if UI is serving
            dot.classList.add('active');
            text.textContent = 'Server Ready';
        }

        // ═══════════════════════════════════════════
        //  UI HELPERS
        // ═══════════════════════════════════════════
        function hideWelcome() {
            const msgs = document.getElementById('messages');
            if (msgs.querySelector('i.fa-sparkles')) {
                msgs.innerHTML = '';
            }
        }

        function addUserMsg(text) {
            const msgs = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML = `
                <div class="avatar"><i class="fas fa-user"></i></div>
                <div class="msg-bubble">${escHtml(text)}</div>
            `;
            msgs.appendChild(div);
            scrollBottom();
        }

        function addAssistantMsg(text, sources) {
            const msgs = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message assistant';

            const sourcesHtml = sources.length ? `
                <div class="msg-sources">
                    ${sources.map((s, idx) => `
                        <div class="source-tag" onclick="toggleSource(this)">
                            <i class="fas fa-file-lines"></i> ${escHtml(s.title)}
                            <div class="source-tooltip">${escHtml(s.text)}</div>
                        </div>
                    `).join('')}
                </div>` : '';

            div.innerHTML = `
                <div class="avatar"><i class="fas fa-robot"></i></div>
                <div style="flex:1;">
                    <div class="msg-bubble">${formatAnswer(text)}</div>
                    ${sourcesHtml}
                </div>
            `;
            msgs.appendChild(div);
            scrollBottom();
        }

        function toggleSource(el) {
            const tooltip = el.querySelector('.source-tooltip');
            const isVisible = tooltip.style.display === 'block';
            document.querySelectorAll('.source-tooltip').forEach(t => t.style.display = 'none');
            tooltip.style.display = isVisible ? 'none' : 'block';
        }

        function addThinking() {
            const msgs = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.innerHTML = `
                <div class="avatar"><i class="fas fa-robot"></i></div>
                <div class="msg-bubble" style="color:var(--text-dim); font-size:0.8rem;">
                    <i class="fas fa-circle-notch fa-spin"></i> Analyzing...
                </div>
            `;
            msgs.appendChild(div);
            scrollBottom();
            return div;
        }

        function removeThinking(el) { if (el) el.remove(); }

        function formatAnswer(text) {
            return escHtml(text || '').replace(/\n/g, '<br/>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        }

        function escHtml(s) {
            return String(s || "")
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function scrollBottom() {
            const msgs = document.getElementById('messages');
            msgs.scrollTop = msgs.scrollHeight;
        }

        function setProgress(pct) {
            document.getElementById('progressBar').style.width = pct + '%';
        }

        function updateChunkInfo() {
            const el = document.getElementById('chunkInfo');
            if (el) el.textContent = totalChunks > 0 ? `${totalChunks} segments indexed` : '';
        }

        function renderMeetings() {
            const list = document.getElementById('meetingList');
            const sel = document.getElementById('projectFilter');
            const search = document.getElementById('libSearch').value.toLowerCase();

            if (!meetings.length) {
                list.innerHTML = '<div style="text-align:center; padding:2rem; opacity:0.3; font-size:0.8rem;">Library is empty</div>';
                document.getElementById('meetCount').textContent = '0';
                return;
            }

            const activeProject = sel.value;
            const projects = [...new Set(meetings.map(m => m.project))].filter(Boolean);
            sel.innerHTML = '<option value="">All Projects</option>' +
                projects.map(p => `<option value="${escHtml(p)}" ${p === activeProject ? 'selected' : ''}>${escHtml(p)}</option>`).join('');

            const filtered = meetings.filter(m => {
                const text = (m.title + ' ' + (m.project || '')).toLowerCase();
                return text.includes(search);
            });

            document.getElementById('meetCount').textContent = filtered.length;

            list.innerHTML = filtered.slice().reverse().map(m => `
                <div class="meeting-item" onclick="setSearchFilter('${escHtml(m.title)}')">
                    <h4>${escHtml(m.title)}</h4>
                    <div class="meta">${m.date} · ${m.project} · ${m.chunkCount} segments</div>
                    <div class="delete-btn" onclick="deleteMeeting('${escHtml(m.title)}', event)">
                        <i class="fas fa-trash-alt"></i>
                    </div>
                </div>
            `).join('');
        }

        function setSearchFilter(title) {
            const input = document.getElementById('questionInput');
            input.value = `Tell me about ${title}`;
            input.focus();
        }

        function toast(msg, type = 'info') {
            const wrap = document.getElementById('toastWrap');
            const el = document.createElement('div');
            el.style.cssText = `padding: 0.8rem 1.2rem; background: var(--bg-card); border-left: 4px solid ${type === 'success' ? 'var(--success)' : 'var(--primary)'}; border-radius: 8px; font-size: 0.8rem; backdrop-filter: blur(10px); color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.3);`;
            el.textContent = msg;
            wrap.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }
    </script>
</body>
</html>
